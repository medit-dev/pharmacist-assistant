name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  security-events: write   # Required for uploading SARIF to GitHub Code Scanning
  contents: read            # Required for actions/checkout

jobs:
  snyk-security:
    name: Snyk Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Uses composite action at .github/actions — sets up pnpm + node + installs deps
      - name: Setup Node & Install Dependencies
        uses: ./.github/actions

      - name: Install Snyk CLI
        run: npm install -g snyk@latest

      # ──────────────────────────────────────────────────────
      # SCA — Open Source dependency vulnerability scanning
      # ──────────────────────────────────────────────────────
      - name: "Snyk: Open Source Test (SCA)"
        id: snyk_sca
        continue-on-error: true  # Don't block pipeline — SARIF upload must happen regardless
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >
          snyk test
          --all-projects
          --severity-threshold=high
          --fail-on=upgradable
          -p
          --sarif-file-output=snyk-open-source.sarif

      - name: Upload SCA SARIF to GitHub Code Scanning
        if: ${{ always() && hashFiles('snyk-open-source.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-open-source.sarif
          category: "Snyk Open Source"

      # ──────────────────────────────────────────────────────
      # SAST — Static Application Security Testing
      # ──────────────────────────────────────────────────────
      - name: "Snyk: Code Test (SAST)"
        id: snyk_code
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >
          snyk code test
          --sarif-file-output=snyk-code.sarif

      - name: Upload SAST SARIF to GitHub Code Scanning
        if: ${{ always() && hashFiles('snyk-code.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: "Snyk Code"

      # ──────────────────────────────────────────────────────
      # Monitor — Push snapshot to Snyk Dashboard (main only)
      # ──────────────────────────────────────────────────────
      - name: "Snyk: Monitor (push to dashboard)"
        if: >-
          github.ref == 'refs/heads/main'
          && github.event_name == 'push'
          && steps.snyk_sca.outcome == 'success'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk monitor --all-projects -p
